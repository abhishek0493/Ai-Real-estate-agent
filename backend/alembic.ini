# Alembic migration configuration.

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is set dynamically in env.py from the app config,
# so this fallback is only used if env.py fails to override it.
sqlalchemy.url = postgresql://postgres:changeme@localhost:5432/ai_real_estate

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
